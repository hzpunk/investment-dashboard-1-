services:
  db:
    image: postgres:16-alpine
    container_name: investment-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: investuser
      POSTGRES_PASSWORD: investpass
      POSTGRES_DB: investment_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investuser -d investment_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investment-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://investuser:investpass@db:5432/investment_dashboard?schema=public
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OLLAMA_URL: http://100.91.135.114:11434/v1
      AI_MODEL: "mistralai/mistral-7b-instruct-v0.3"
      AI_DEBUG: "false"
      AI_FORCE_USER_ASSISTANT_ROLES: "true"
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

  redis:
    image: redis:7-alpine
    container_name: investment-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
