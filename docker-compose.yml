version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: investment-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: investuser
      POSTGRES_PASSWORD: investpass
      POSTGRES_DB: investment_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investuser -d investment_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investment-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://investuser:investpass@db:5432/investment_dashboard?schema=public
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OLLAMA_URL: http://ai:11434
      AI_MODEL: mistral:7b
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

  ai:
    image: ollama/ollama:latest
    container_name: investment-ai
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  postgres_data:
  ollama_data:
